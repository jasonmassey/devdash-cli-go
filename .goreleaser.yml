version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: devdash
    main: ./cmd/devdash
    binary: devdash
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jasonmassey/devdash-cli-go/internal/commands.Version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "devdash_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: jasonmassey
    name: devdash-cli-go
  draft: false
  prerelease: auto

