name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

      - name: Test
        run: go test -timeout 30s -p 2 -race ./...

      - name: Build
        run: go build -o devdash ./cmd/devdash

      - name: Smoke test
        run: |
          ./devdash version
          ./devdash help cli | head -5
